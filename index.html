<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image to PDF Converter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    header {
      background: #4c51bf;
      color: white;
      padding: 30px;
      text-align: center;
    }
    h1 { font-size: 2.4rem; margin-bottom: 8px; }
    p { opacity: 0.95; }

    .main-area {
      padding: 40px 30px;
      text-align: center;
    }

    #addBtn {
      padding: 16px 40px;
      font-size: 1.3rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin: 20px 0;
    }
    #addBtn:hover { background: #4338ca; transform: scale(1.05); }

    .preview {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin: 30px 0;
      padding: 20px;
      background: #f8fafc;
      border-radius: 12px;
      min-height: 200px;
    }
    .preview img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid #e2e8f0;
    }

    .format-section {
      margin: 25px 0;
      padding: 20px;
      background: #f8fafc;
      border-radius: 12px;
      display: none;
    }
    select {
      padding: 12px 16px;
      font-size: 1.1rem;
      border-radius: 8px;
      border: 2px solid #cbd5e1;
      width: 360px;
    }

    #convertBtn {
      padding: 16px 50px;
      font-size: 1.4rem;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin: 20px 0;
      display: none;
    }
    #convertBtn:hover { background: #059669; }

    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      margin: 30px 0;
    }
    .spinner {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #4f46e5;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .status {
      margin: 15px 0;
      font-size: 1.1rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🖼️ Image to PDF</h1>
      <p>Convert your images into a PDF file easily</p>
    </header>

    <div class="main-area">
      <button id="addBtn">+ Add Images</button>
      <input type="file" id="fileInput" multiple accept="image/*" style="display:none;">

      <div class="preview" id="preview"></div>

      <div class="format-section" id="formatSection">
        <label><strong>Choose Image Quality / Format:</strong></label><br><br>
        <select id="formatSelect">
          <option value="PNG">PNG - Highest Quality (Largest PDF)</option>
          <option value="JPEG" selected>JPEG - Good Quality (Recommended)</option>
          <option value="JPG">JPG - Standard Quality</option>
          <option value="WEBP">WebP - High Quality (Converted to JPEG)</option>
        </select>
      </div>

      <button id="convertBtn">Convert to PDF</button>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Processing your images... Please wait</p>
      </div>

      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
    let images = [];

    const addBtn = document.getElementById('addBtn');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const convertBtn = document.getElementById('convertBtn');
    const loading = document.getElementById('loading');
    const status = document.getElementById('status');
    const formatSection = document.getElementById('formatSection');
    const formatSelect = document.getElementById('formatSelect');

    addBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFiles(e.target.files));

    function handleFiles(files) {
      Array.from(files).forEach(file => {
        if (file.type.startsWith('image/')) {
          const reader = new FileReader();
          reader.onload = ev => {
            images.push({ name: file.name, data: ev.target.result });
            renderPreview();
          };
          reader.readAsDataURL(file);
        }
      });
    }

    function renderPreview() {
      preview.innerHTML = '';
      images.forEach(img => {
        const div = document.createElement('div');
        div.innerHTML = `
          <img src="${img.data}" alt="preview">
          <small style="display:block; text-align:center; margin-top:5px; color:#666;">${img.name}</small>
        `;
        preview.appendChild(div);
      });

      const hasImages = images.length > 0;
      convertBtn.style.display = hasImages ? 'inline-block' : 'none';
      formatSection.style.display = hasImages ? 'block' : 'none';
    }

    // Convert image to desired format using Canvas
    async function convertImage(imgData, targetFormat) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);

          let mimeType = 'image/jpeg';
          let quality = 0.92;

          if (targetFormat === 'PNG') {
            mimeType = 'image/png';
            quality = 1;
          }

          resolve(canvas.toDataURL(mimeType, quality));
        };
        img.src = imgData;
      });
    }

    convertBtn.addEventListener('click', async function() {
      if (images.length === 0) return;

      const selectedFormat = formatSelect.value;

      convertBtn.style.display = 'none';
      loading.style.display = 'flex';
      status.textContent = `Converting to ${selectedFormat}...`;

      try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();

        for (let i = 0; i < images.length; i++) {
          status.textContent = `Processing image ${i+1} of ${images.length}...`;

          if (i > 0) pdf.addPage();

          let finalData = await convertImage(images[i].data, selectedFormat);

          const imgProps = await getImageDimensions(finalData);

          const ratio = Math.min(pageWidth / imgProps.width, (pageHeight - 30) / imgProps.height);
          const newWidth = imgProps.width * ratio;
          const newHeight = imgProps.height * ratio;

          const x = (pageWidth - newWidth) / 2;
          const y = (pageHeight - newHeight) / 2;

          const pdfFormat = (selectedFormat === 'JPG' || selectedFormat === 'WEBP') ? 'JPEG' : selectedFormat;

          pdf.addImage(finalData, pdfFormat, x, y, newWidth, newHeight);
        }

        pdf.save("Converted_Images.pdf");
        status.innerHTML = `<strong style="color:green;">✅ PDF Generated Successfully with ${selectedFormat}!</strong>`;

      } catch (err) {
        console.error(err);
        status.innerHTML = `<strong style="color:red;">❌ Error occurred. Please try again.</strong>`;
      }

      setTimeout(() => {
        loading.style.display = 'none';
        convertBtn.style.display = 'inline-block';
      }, 2500);
    });

    function getImageDimensions(imgData) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve({ width: img.width, height: img.height });
        img.src = imgData;
      });
    }
  </script>
</body>
</html>
